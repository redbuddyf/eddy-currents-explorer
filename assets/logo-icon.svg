<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0f0f1a"/>
  
  <!-- Outer orbit -->
  <ellipse cx="50" cy="50" rx="40" ry="40" fill="none" stroke="url(#iconGrad)" stroke-width="3" opacity="0.4"/>
  <ellipse cx="50" cy="50" rx="40" ry="40" fill="none" stroke="url(#iconGrad)" stroke-width="3" opacity="0.7" stroke-dasharray="80 40"/>
  
  <!-- Cross orbits -->
  <ellipse cx="50" cy="50" rx="30" ry="30" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5" transform="rotate(60 50 50)"/>
  <ellipse cx="50" cy="50" rx="30" ry="30" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5" transform="rotate(120 50 50)"/>
  
  <!-- Central nucleus -->
  <circle cx="50" cy="50" r="20" fill="url(#iconGrad)"/>
  <circle cx="50" cy="50" r="10" fill="url(#centerGrad)"/>
  
  <!-- Orbiting particles -->
  <circle cx="90" cy="50" r="6" fill="#22d3ee"/>
  <circle cx="50" cy="10" r="5" fill="#fbbf24"/>
  <circle cx="15" cy="75" r="5" fill="#f472b6"/>
</svg>