<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(20, 10)">
    <!-- Outer orbit -->
    <ellipse cx="40" cy="40" rx="35" ry="35" fill="none" stroke="url(#logoGrad)" stroke-width="2" opacity="0.3"/>
    <ellipse cx="40" cy="40" rx="35" ry="35" fill="none" stroke="url(#logoGrad)" stroke-width="2" opacity="0.6" stroke-dasharray="60 30"/>
    
    <!-- Inner orbit -->
    <ellipse cx="40" cy="40" rx="25" ry="25" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5" transform="rotate(60 40 40)"/>
    
    <!-- Central atom nucleus -->
    <circle cx="40" cy="40" r="15" fill="url(#logoGrad)"/>
    <circle cx="40" cy="40" r="8" fill="url(#chemGrad)"/>
    
    <!-- Electrons/particles -->
    <circle cx="75" cy="40" r="5" fill="#22d3ee"/>
    <circle cx="40" cy="5" r="4" fill="#fbbf24"/>
    <circle cx="10" cy="60" r="4" fill="#f472b6"/>
  </g>
  
  <!-- Text -->
  <text x="110" y="45" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="32" font-weight="700" fill="#f1f5f9">Science</text>
  <text x="110" y="75" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="32" font-weight="700" fill="url(#logoGrad)">Unpacked</text>
  
  <!-- Tagline -->
  <text x="110" y="90" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8">Physics & Chemistry</text>
</svg>