<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="magnetGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="currentGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Eddy current rings -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#currentGrad2)" stroke-width="2" opacity="0.6"/>
  <circle cx="50" cy="50" r="32" fill="none" stroke="url(#currentGrad2)" stroke-width="1.5" opacity="0.5" stroke-dasharray="15 8"/>
  <circle cx="50" cy="50" r="24" fill="none" stroke="url(#currentGrad2)" stroke-width="2" opacity="0.7" stroke-dasharray="20 10"/>
  
  <!-- Magnet -->
  <rect x="35" y="30" width="30" height="40" rx="3" fill="url(#magnetGrad2)"/>
  <rect x="35" y="30" width="30" height="19" rx="3" fill="#ef4444"/>
  <rect x="35" y="51" width="30" height="19" rx="3" fill="#3b82f6"/>
  <text x="50" y="44" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">N</text>
  <text x="50" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">S</text>
</svg>