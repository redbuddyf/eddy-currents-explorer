<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradients -->
    <linearGradient id="magnetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="northGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="southGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="currentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#0f0f1a" stroke="#2d2d44" stroke-width="2"/>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#magnetGrad)" stroke-width="1" opacity="0.3"/>
  
  <!-- Eddy current rings (swirling effect) -->
  <!-- Outer eddy currents -->
  <ellipse cx="100" cy="100" rx="70" ry="70" fill="none" stroke="url(#currentGrad)" stroke-width="2" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  
  <ellipse cx="100" cy="100" rx="65" ry="65" fill="none" stroke="url(#currentGrad)" stroke-width="1.5" opacity="0.5" stroke-dasharray="20 10">
    <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  
  <ellipse cx="100" cy="100" rx="58" ry="58" fill="none" stroke="url(#currentGrad)" stroke-width="1" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Inner eddy current swirls -->
  <ellipse cx="100" cy="100" rx="50" ry="50" fill="none" stroke="url(#currentGrad)" stroke-width="2" opacity="0.7" stroke-dasharray="30 15">
    <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Magnetic field lines -->
  <path d="M 100 25 Q 140 60 140 100" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="0 200;100 100;200 0" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 100 25 Q 60 60 60 100" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="0 200;100 100;200 0" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 100 175 Q 140 140 140 100" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="0 200;100 100;200 0" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 100 175 Q 60 140 60 100" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="0 200;100 100;200 0" dur="2s" repeatCount="indefinite"/>
  </path>
  
  <!-- Central Magnet -->
  <g filter="url(#glow)">
    <!-- Magnet body -->
    <rect x="75" y="60" width="50" height="80" rx="4" fill="url(#magnetGrad)"/>
    
    <!-- North pole (red) -->
    <rect x="75" y="60" width="50" height="38" rx="4" fill="url(#northGrad)"/>
    <text x="100" y="85" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">N</text>
    
    <!-- South pole (blue) -->
    <rect x="75" y="102" width="50" height="38" rx="4" fill="url(#southGrad)"/>
    <text x="100" y="127" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">S</text>
    
    <!-- Magnet shine -->
    <rect x="78" y="62" width="10" height="76" rx="2" fill="white" opacity="0.2"/>
  </g>
  
  <!-- Energy particles -->
  <circle cx="50" cy="100" r="3" fill="#22d3ee" opacity="0.8">
    <animate attributeName="cx" values="50;150;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="100" r="3" fill="#22d3ee" opacity="0.8">
    <animate attributeName="cx" values="150;50;150" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="50" r="2" fill="#fbbf24" opacity="0.8">
    <animate attributeName="cy" values="50;150;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Lightning/spark effects -->
  <path d="M 60 100 L 70 95 L 75 100 L 80 90" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.6">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 140 100 L 130 105 L 125 100 L 120 110" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.6">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.7s" repeatCount="indefinite"/>
  </path>
</svg>